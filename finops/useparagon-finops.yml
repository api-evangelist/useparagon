description: >-
  FinOps view of Paragon spend. Paragon is a sales-led embedded integration
  platform billed via negotiated subscription tiers rather than transparent
  per-call rates. The primary cost drivers are the number of production
  integrations, the count of active connected users, and which products are enabled
  (Connect/Workflows, ActionKit, Managed Sync). A meaningful secondary cost is the
  downstream consumption of the third-party APIs Paragon proxies and syncs, which is
  billed by those providers, not Paragon. This artifact models Paragon usage as
  metered dimensions so it can be tracked even though list prices are quote-based.
notes: >-
  Paragon does not publish public unit prices; meter values below are logical cost
  dimensions for allocation and forecasting, not confirmed rate cards. Reconcile
  against your Paragon order form and invoices.
sources:
- https://www.useparagon.com/pricing
- https://docs.useparagon.com/
