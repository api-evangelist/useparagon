meters:
- name: production_integrations
  description: Number of live third-party integrations enabled in production.
  unit: integrations
  aggregation: max
  dimensions:
  - project
  - integration
- name: connected_users
  description: Active end users with at least one connected integration.
  unit: users
  aggregation: max
  dimensions:
  - project
  - integration
- name: workflow_executions
  description: Workflow runs triggered via events, CRON, webhooks, or the API Trigger.
  unit: executions
  aggregation: sum
  dimensions:
  - project
  - workflow
- name: actionkit_runs
  description: ActionKit action executions (POST /actions/run) performed for agents.
  unit: invocations
  aggregation: sum
  dimensions:
  - project
  - action
  - provider
- name: managed_sync_records
  description: Records ingested and kept current through Managed Sync pipelines.
  unit: records
  aggregation: sum
  dimensions:
  - project
  - integration
  - pipeline
- name: proxy_requests
  description: Passthrough proxy calls to connected third-party APIs.
  unit: requests
  aggregation: sum
  dimensions:
  - project
  - integration
principles:
- name: Visibility
  description: Track connected-user counts and production integration counts per project against the contracted tier.
- name: Allocation
  description: Tag workflows, ActionKit actions, and syncs per customer/team to map Paragon cost to internal cost centers.
- name: Optimization
  description: Retire unused integrations, prune idle connected users, and prefer Managed Sync over high-frequency Proxy polling to reduce downstream provider costs.
- name: Accountability
  description: Assign owners per integration/pipeline and review connected-user growth against the plan ceiling before renewal.
