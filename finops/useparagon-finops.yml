  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Paragon
serviceCategory: Integration Platform
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Paragon
